<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommitList | Smart Task Board</title>
    <link rel="icon" type="image/svg+xml" href="./assets/commitlist-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./dist/output.css" />
  </head>
  <body class="min-h-screen animated-page-bg text-slate-900">
    <header class="sticky top-0 z-50 relative backdrop-blur shadow-sm">
      <div class="animated-header-bg absolute inset-0 -z-10"></div>
      <div class="mx-auto flex max-w-9xl flex-col gap-4 px-4 py-4 relative z-10 sm:flex-row sm:items-center sm:justify-between sm:gap-6 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
          <img src="./assets/commitlist-logo.svg" alt="CommitList logo" class="h-11 w-11 rounded-xl shadow-sm" />
          <div>
          <h1 class="text-2xl font-extrabold tracking-tight sm:text-3xl">
            <a
              href="./index.html"
              class="bg-gradient-to-r from-indigo-600 via-violet-600 to-purple-600 bg-clip-text text-transparent hover:opacity-90"
              title="Open CommitList home"
            >
              CommitList
            </a>
          </h1>
          <p class="text-sm text-slate-500">
            Your daily command center for tasks, priorities, and productivity — built for people who want to get things done.
          </p>
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-2 text-xs font-semibold">
          <div class="group flex items-center gap-2 rounded-full border border-indigo-200 bg-gradient-to-r from-white to-indigo-50 px-3 py-1.5 text-indigo-700 shadow-sm transition hover:shadow-md">
            <img src="./assets/clock-icon.svg" alt="Clock icon" class="h-4 w-4" />
            <span id="liveClock" class="font-bold tracking-wide">--:--:--</span>
          </div>
          <div class="group flex items-center gap-2 rounded-full border border-sky-200 bg-gradient-to-r from-white to-sky-50 px-3 py-1.5 text-sky-700 shadow-sm transition hover:shadow-md">
            <img src="./assets/calendar-icon.svg" alt="Calendar icon" class="h-4 w-4" />
            <span id="liveDate" class="font-semibold">---- -- --</span>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-9xl space-y-6 px-4 py-6 sm:px-6 lg:px-8">
      <section class="grid gap-4 sm:grid-cols-2 lg:grid-cols-5" id="stats"></section>

      <section id="filters" class="rounded-xl bg-white p-4 shadow-sm">
        <div class="mb-4 flex items-center justify-between gap-3">
          <h2 class="flex items-center gap-2 text-lg font-semibold">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h18M6 12h12m-9 7h6" />
            </svg>
            Filter Todos
          </h2>
          <button
            id="resetFiltersBtn"
            type="button"
            class="inline-flex items-center gap-1 rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v6h6M20 20v-6h-6" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 9a8 8 0 0 0-14-3M4 15a8 8 0 0 0 14 3" />
            </svg>
            Reset Filters
          </button>
        </div>
        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-6">
          <label class="text-sm">
            <span class="mb-1 block text-slate-600">Search</span>
            <input id="searchInput" type="text" placeholder="Title or description" class="w-full rounded-md border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none" />
          </label>
          <label class="text-sm">
            <span class="mb-1 block text-slate-600">User</span>
            <select id="userFilter" class="w-full rounded-md border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none"></select>
          </label>
          <label class="text-sm">
            <span class="mb-1 block text-slate-600">Category</span>
            <select id="categoryFilter" class="w-full rounded-md border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none"></select>
          </label>
          <label class="text-sm">
            <span class="mb-1 block text-slate-600">Status</span>
            <select id="statusFilter" class="w-full rounded-md border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none"></select>
          </label>
          <label class="text-sm">
            <span class="mb-1 block text-slate-600">Priority</span>
            <select id="priorityFilter" class="w-full rounded-md border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none"></select>
          </label>
          <label class="text-sm">
            <span class="mb-1 block text-slate-600">Tag</span>
            <select id="tagFilter" class="w-full rounded-md border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:outline-none"></select>
          </label>
        </div>
      </section>

      <section class="grid gap-6 lg:grid-cols-4">
        <aside class="space-y-4 lg:col-span-1">
          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 class="mb-3 text-xl font-semibold">Status 🚦</h2>
            <div id="statusesList" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 class="mb-3 text-xl font-semibold">Priority ⚡</h2>
            <div id="prioritiesList" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 class="mb-3 text-xl font-semibold">Categories 🗂️</h2>
            <div id="categoriesList" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 class="mb-3 text-xl font-semibold">Tags 🏷️</h2>
            <div id="tagsList" class="flex flex-wrap gap-2"></div>
          </div>
        </aside>

        <div class="lg:col-span-2 space-y-4">
          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 class="mb-4 flex items-center gap-2 text-lg font-semibold">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 11l3 3L22 4" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
              </svg>
              Todos
            </h2>
            <div id="todoList" class="space-y-3"></div>
            <div id="pagination" class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"></div>
          </div>
        </div>

        <aside class="space-y-4 lg:col-span-1">
          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 class="mb-3 text-lg font-semibold">Users 👥</h2>
            <div id="usersList" class="space-y-2"></div>
          </div>
        </aside>
      </section>
    </main>

    <footer class="mt-12">
      <div class="mx-auto max-w-9xl px-4 pb-8 sm:px-6 lg:px-8">
        <div class="rounded-xl border border-white/60 bg-white/70 backdrop-blur p-4 text-center text-sm text-slate-600 shadow-sm">
          <span id="footerYear"></span> &copy; <span class="font-semibold text-slate-800">NM</span>. All rights reserved.
        </div>
      </div>
    </footer>

    <script>
      (function () {
        const el = document.getElementById("footerYear");
        if (el) el.textContent = String(new Date().getFullYear());
      })();
    </script>

    <script src="./script.js"></script>
  </body>
</html>
